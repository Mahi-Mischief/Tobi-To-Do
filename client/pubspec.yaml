name: tobi_todo
description: AI-powered personal assistant and life planner - Flutter frontend.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^3.2.1
  flutter_riverpod: ^3.2.1

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  firebase_messaging: ^16.1.1
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # Networking & HTTP
  http: ^1.1.0
  dio: ^5.3.0

  # Local Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.2

  # UI & Design
  google_fonts: ^8.0.1
  flutter_svg: ^2.0.0
  intl: ^0.20.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  supabase_flutter: ^2.8.0

  # Navigation
  go_router: ^17.1.0

  # Utilities
  uuid: ^4.0.0
  logger: ^2.0.0
  fl_chart: ^0.66.0
  csv: ^5.0.0
  pdf: ^3.10.0
  printing: ^5.10.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/dream_me_background.png
    - assets/tobi_animations/
    - assets/tobi_animations/dance/
    - assets/tobi_animations/idle/
    - assets/tobi_animations/jump_celebrate/
    - assets/tobi_animations/punch_celebrate/
    - assets/tobi_animations/sad/
    - assets/tobi_animations/think/
    - assets/tobi_animations/wave/
    - assets/avatar/
    - assets/avatar/bangs/
    - assets/avatar/BEARD/
    - assets/avatar/body/
    - assets/avatar/bottom/
    - assets/avatar/dress/
    - assets/avatar/EYEBROWS/
    - assets/avatar/EYELASHES/
    - assets/avatar/gloves/
    - assets/avatar/hair/
    - assets/avatar/hair_back/
    - assets/avatar/hair_bonus/
    - assets/avatar/MOUTH/
    - assets/avatar/PUPILS/
    - assets/avatar/shoes/
    - assets/avatar/top/

  # Custom fonts will be added when available
  # fonts:
