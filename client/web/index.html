<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <script>
    // If Flutter hasn't replaced the placeholder (e.g., serving raw web/), default to root so assets resolve
    (function () {
      const base = document.querySelector('base');
      if (base && base.getAttribute('href') === '$FLUTTER_BASE_HREF') {
        base.setAttribute('href', '/');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Tobi - AI Life Operating System">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Tobi">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Tobi To-Do</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // Hard-unregister any old service workers so fresh assets load (avoids cached 404s like assets/assets/...)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    }
  </script>

  <!-- Firebase scripts are initialized from Dart; removing direct includes to avoid module import errors on web. -->
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
